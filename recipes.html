<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>FactoryCalc — Recipe Database | Pioneer Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.app{grid-template-columns:1fr}
.recipe-page{display:flex;flex-direction:column;flex:1;overflow:hidden}
.recipe-toolbar{padding:14px 24px;border-bottom:1px solid var(--border);background:rgba(12,10,6,0.5);flex-shrink:0}
.recipe-toolbar .rt-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--warm);letter-spacing:1px;margin-bottom:4px}
.recipe-toolbar .rt-sub{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--dim);letter-spacing:2px}
.search-row{display:flex;gap:10px;margin-top:12px;align-items:center}
.search-row .fi{flex:1;max-width:400px}
.search-row .count{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;white-space:nowrap}
.recipe-scroll{flex:1;overflow-y:auto;padding:20px 24px}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.recipe-card{background:var(--panel);border:1px solid var(--border);position:relative;transition:border-color 0.15s}
.recipe-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),transparent)}
.recipe-card:hover{border-color:var(--border-hot)}
.rc-head{padding:10px 14px;border-bottom:1px solid var(--border)}
.rc-name{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--warm);letter-spacing:0.5px}
.rc-meta{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.rc-alt-tabs{display:flex;gap:2px;padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.rc-alt-tab{padding:4px 10px;font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--dim);background:transparent;border:1px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:0.5px;transition:all 0.12s}
.rc-alt-tab:hover{color:var(--muted);border-color:var(--border)}
.rc-alt-tab.on{color:var(--amber);border-color:var(--border-hot);background:rgba(255,179,0,0.06)}
.rc-body{padding:10px 14px}
.rc-stat{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rc-sk{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:1px}
.rc-sv{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold)}
.rc-inputs{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.rc-io-label{font-family:'Share Tech Mono',monospace;font-size:7px;color:var(--dim);letter-spacing:2px;margin-bottom:4px}
.rc-input-item{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding:2px 0}
.rc-input-item .rc-io-rate{font-family:'Share Tech Mono',monospace;color:rgba(120,160,220,0.9)}
.rc-output-item{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);padding:2px 0}
.rc-output-item .rc-io-rate{font-family:'Share Tech Mono',monospace;color:var(--gold)}
.rc-byproduct-item{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);padding:2px 0;font-style:italic}
.rc-byproduct-item .rc-io-rate{font-family:'Share Tech Mono',monospace;color:var(--muted)}
.rc-footer{padding:8px 14px;border-top:1px solid var(--border);display:flex;gap:6px;justify-content:flex-end}
.rc-btn{padding:5px 12px;font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:all 0.12s}
.rc-btn.primary{background:var(--amber);color:var(--obsidian)}
.rc-btn.primary:hover{background:var(--gold)}
.rc-btn.secondary{background:transparent;color:var(--muted);border:1px solid var(--dim)}
.rc-btn.secondary:hover{border-color:var(--muted);color:var(--warm)}
.no-results{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;opacity:0.4}
.no-results .nr-icon{font-size:36px}
.no-results .nr-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:2px;text-align:center}
.tier-filter{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:9px;padding:6px 10px;letter-spacing:1px;cursor:pointer}
.tier-filter:hover{border-color:var(--border-hot)}
.tier-badge{display:inline-block;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:9px;padding:1px 5px;border-radius:2px;letter-spacing:0.5px}
.tier-S{background:#FFD54F;color:#0C0A06}
.tier-A{background:#4CAF50;color:#0C0A06}
.tier-B{background:#42A5F5;color:#0C0A06}
.tier-C{background:#78909C;color:#FFF8E1}
.tier-D{background:#FF9800;color:#0C0A06}
.tier-F{background:#F44336;color:#FFF8E1}
</style>
</head>
<body>
  <nav>
  <a class="logo" href="index.html">
    <div class="logo-hex">
      <svg width="28" height="28" viewBox="0 0 28 28"><polygon points="14,1 27,7.5 27,20.5 14,27 1,20.5 1,7.5" fill="#FFB300"/></svg>
      <span class="logo-letter">F</span>
    </div>
    <span class="logo-wm">Factory<em>Calc</em></span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Pioneer Edition</span>
  </a>
  <div class="nav-links">
    <a href="index.html" class="nl">Planner</a>
    <a href="recipes.html" class="nl on">Recipes</a>
    <a href="power.html" class="nl">Power</a>
    <a href="nodes.html" class="nl">Nodes</a>
    <a href="phases.html" class="nl">Phases</a>
  </div>
  <div class="nav-r">
    <span class="ver-tag">v1.5</span>
    <div class="mode-badge">RECIPE DATABASE</div>
  </div>
</nav>

<div class="app">
  <div class="recipe-page">
    <div class="recipe-toolbar">
      <div class="rt-title">TECHNICAL SPECIFICATION CARDS</div>
      <div class="rt-sub">// SEARCHABLE RECIPE DATABASE · ALL RECIPES AT 100% CLOCK</div>
      <div class="search-row">
        <input class="fi" id="recipeSearch" type="text" placeholder="Search items or recipes..." oninput="RecipesApp.render()">
        <select class="tier-filter" id="tierFilter" onchange="RecipesApp.render()">
          <option value="">ALL TIERS</option>
          <option value="S">S</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
          <option value="F">F</option>
        </select>
        <span class="count" id="resultCount"></span>
      </div>
    </div>
    <div class="recipe-scroll" id="recipeScroll">
      <div class="recipe-grid" id="recipeGrid"></div>
    </div>
  </div>
</div>

<script src="recipes.js"></script>
<script>
const RecipesApp = (() => {
  const fmt = v => typeof v === 'number'
    ? (v % 1 === 0 ? v.toLocaleString() : parseFloat(v.toFixed(2)).toLocaleString())
    : v;

  function sendToPlanner(itemName, recipeName) {
    const payload = {
      i: itemName, t: 10, oc: 100,
      sl: 0, bl: 780, pl: 600,
      or: { [itemName]: recipeName }
    };
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
    window.location.href = `index.html?plan=${encoded}`;
  }

  function render() {
    const query = (document.getElementById('recipeSearch').value || '').toLowerCase().trim();
    const tierFilter = (document.getElementById('tierFilter').value || '').trim();
    const grid  = document.getElementById('recipeGrid');
    const count = document.getElementById('resultCount');

    let items = Object.keys(RECIPES);

    if (query) {
      items = items.filter(name =>
        name.toLowerCase().includes(query) ||
        (RECIPES[name].alts || []).some(a => a.toLowerCase().includes(query))
      );
    }

    if (tierFilter) {
      items = items.filter(name => {
        const entry = RECIPES[name];
        return (entry.alts || []).some(a => {
          const r = entry.recipes[a];
          return r && r.tier === tierFilter;
        });
      });
    }

    count.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;

    if (!items.length) {
      const filterMsg = tierFilter ? ` (TIER ${tierFilter})` : '';
      grid.innerHTML = `<div class="no-results"><div class="nr-icon">⬡</div><div class="nr-text">NO RECIPES MATCH${filterMsg}<br>${query.toUpperCase()}</div></div>`;
      return;
    }

    grid.innerHTML = items.map(itemName => {
      const entry = RECIPES[itemName];
      const activeAlt = entry.alts[0];
      const activeRec = entry.recipes[activeAlt];

      const inputLines = (activeRec.inputs || []).map(inp =>
        `<div class="rc-input-item"><span>${inp.item}</span><span class="rc-io-rate">${fmt(inp.qty)}/min</span></div>`
      ).join('');

      const outputLine = `<div class="rc-output-item"><span>${itemName}</span><span class="rc-io-rate">${fmt(activeRec.output)}/min</span></div>`;

      const byproductLine = activeRec.byproduct
        ? `<div class="rc-byproduct-item"><span>↳ ${activeRec.byproduct.item}</span><span class="rc-io-rate">${fmt(activeRec.byproduct.qty)}/min</span></div>`
        : '';

      const altTabs = entry.alts.map(a =>
        `<button class="rc-alt-tab${a === activeAlt ? ' on' : ''}" onclick="RecipesApp.switchAlt('${itemName.replace(/'/g, "\\'")}','${a.replace(/'/g, "\\'")}',this)">${a}</button>`
      ).join('');

      const tierBadge = activeRec.tier ? `<span class="tier-badge tier-${activeRec.tier}">${activeRec.tier}</span>` : '';

      return `<div class="recipe-card" data-item="${itemName.replace(/"/g,'&quot;')}">
        <div class="rc-head">
          <div class="rc-name">${itemName} ${tierBadge}</div>
          <div class="rc-meta">${activeRec.building} · ${activeRec.mw} MW</div>
        </div>
        <div class="rc-alt-tabs">${altTabs}</div>
        <div class="rc-body">
          <div class="rc-stat"><span class="rc-sk">OUTPUT RATE</span><span class="rc-sv">${fmt(activeRec.output)} / min</span></div>
          <div class="rc-stat"><span class="rc-sk">POWER</span><span class="rc-sv">${activeRec.mw} MW</span></div>
          <div class="rc-inputs">
            <div class="rc-io-label">// INPUTS</div>
            ${inputLines}
            <div class="rc-io-label" style="margin-top:6px">// OUTPUT</div>
            ${outputLine}
            ${byproductLine}
          </div>
        </div>
        <div class="rc-footer">
          <button class="rc-btn primary" onclick="RecipesApp.sendToPlanner('${itemName.replace(/'/g, "\\'")}','${activeAlt.replace(/'/g, "\\'")}')">⬡ SEND TO PLANNER</button>
        </div>
      </div>`;
    }).join('');
  }

  function switchAlt(itemName, altName, btn) {
    const card  = btn.closest('.recipe-card');
    const tabs  = card.querySelectorAll('.rc-alt-tab');
    tabs.forEach(t => t.classList.remove('on'));
    btn.classList.add('on');

    const entry = RECIPES[itemName];
    const rec   = entry.recipes[altName];
    if (!rec) return;

    card.querySelector('.rc-meta').textContent = `${rec.building} · ${rec.mw} MW`;

    const nameEl = card.querySelector('.rc-name');
    const tierBadgeHtml = rec.tier ? `<span class="tier-badge tier-${rec.tier}">${rec.tier}</span>` : '';
    nameEl.innerHTML = `${itemName} ${tierBadgeHtml}`;

    const body = card.querySelector('.rc-body');
    body.innerHTML = `
      <div class="rc-stat"><span class="rc-sk">OUTPUT RATE</span><span class="rc-sv">${fmt(rec.output)} / min</span></div>
      <div class="rc-stat"><span class="rc-sk">POWER</span><span class="rc-sv">${rec.mw} MW</span></div>
      <div class="rc-inputs">
        <div class="rc-io-label">// INPUTS</div>
        ${(rec.inputs || []).map(inp => `<div class="rc-input-item"><span>${inp.item}</span><span class="rc-io-rate">${fmt(inp.qty)}/min</span></div>`).join('')}
        <div class="rc-io-label" style="margin-top:6px">// OUTPUT</div>
        <div class="rc-output-item"><span>${itemName}</span><span class="rc-io-rate">${fmt(rec.output)}/min</span></div>
        ${rec.byproduct ? `<div class="rc-byproduct-item"><span>↳ ${rec.byproduct.item}</span><span class="rc-io-rate">${fmt(rec.byproduct.qty)}/min</span></div>` : ''}
      </div>`;

    const footerBtn = card.querySelector('.rc-btn.primary');
    footerBtn.setAttribute('onclick', `RecipesApp.sendToPlanner('${itemName.replace(/'/g, "\\'")}','${altName.replace(/'/g, "\\'")}')`);
  }

  return { render, sendToPlanner, switchAlt };
})();

document.addEventListener('DOMContentLoaded', RecipesApp.render);
</script>
</body>
</html>
